version: 1
applications:
  - appRoot: frontend-2
    frontend:
      phases:
        preBuild:
          commands:
            - rm -rf node_modules/.cache
            - rm -rf .next
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
            - node scripts/resolve-next-symlinks.js
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
